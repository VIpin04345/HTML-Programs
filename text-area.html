<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <textarea name="story" id="story" cols="20" rows="4">
            Please write a story
        </textarea>
    </form>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Basic Textarea</title>
</head>
<body>

<form>
    <label>Enter your message:</label><br>
    <textarea rows="5" cols="30"></textarea>
</form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Textarea with Limit</title>
</head>
<body>

<form>
    <label>Feedback:</label><br>
    <textarea rows="5" cols="40" placeholder="Write your feedback here..." maxlength="100"></textarea>
</form>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
    <title>Styled Textarea</title>
    <style>
        textarea {
            width: 50%;
            height: 100px;
            padding: 10px;
            border: 2px solid black;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<form>
    <label>Comment:</label><br>
    <textarea placeholder="Type your comment..."></textarea>
</form>

</body>
</html>
