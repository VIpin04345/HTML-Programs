<!DOCTYPE html>
<html>
<head>

</head>

        <th>Name</th>
        <th>Age</th>
        <th>City</th>

<!DOCTYPE html>
<html>
<head>
    <title>Rowspan Colspan Table</title>
</head>
<body>

<table border="1">
    <tr>
        <th>Name</th>
        <th colspan="2">Marks</th>
    </tr>
    <tr>
        <td rowspan="2">Rahul</td>
        <td>Math</td>
        <td>90</td>
    </tr>
    <tr>
        <td>Science</td>
        <td>85</td>
    </tr>
</table>

</body>
</html>


    <!DOCTYPE html>
<html>
<head>
    <title>Styled Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: lightblue;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Marks</th>
    </tr>
    <tr>
        <td>1</td>
        <td>Aman</td>
        <td>88</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Sneha</td>
        <td>92</td>
    </tr>
</table>

</body>
</html>
</body>
</html>
